  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"  # SMTP port
      - "8025:8025"  # Web UI port
    networks:
      - app_network
    restart: unless-stopped
  
networks:
  app_network:
    driver: bridge
    
volumes:
  staticfiles:
    driver: local
  media:      
    driver: local
  redis_data:
    driver: local
  app_logs:
    driver: local
  postgres_data:
    driver: local