[pytest]
DJANGO_SETTINGS_MODULE = config.settings.base
# What test files pytest should discover
python_files = tests.py test_*.py *_tests.py
# Make pytest run from project root
testpaths = apps
# Show slow tests — any test taking more than 0.5s
slow_test_threshold = 0.5
# Display the 10 slowest tests after the run
addopts = 
    --maxfail=1 
    -ra 
    --durations=10 
    --disable-warnings 
    --strict-markers 
    --color=yes
    --tb=long
    -vv
# Markers (register them to avoid warnings)
markers =
    slow: marks tests as slow
    api: API endpoint tests
    websocket: Channels/WebSocket tests
    db: Tests requiring database
    unit: Fast unit tests without Django
    integration: Higher-level integration tests

# Improve warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::RuntimeWarning
# Cache directory (to avoid cluttering project root)
cache_dir = .pytest_cache

# Force pytest to use the correct root dir
# (helps path issues inside nested Django apps)
rootdir = ./

# Output test execution time for all tests
log_cli = true
log_cli_level = INFO

asyncio_mode = auto
transaction=True
